<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        color: #1a1a1a;
        font-size: 15px;
        line-height: 1.6;
        margin: 0;
        padding: 0;
      }

      .container {
        padding: 30px;
        max-width: 600px;
        margin: 30px auto;
        background-color: #ffffff;
        border-radius: 12px;
      }

      h1 {
        font-size: 20px;
        color: #2d2d2d;
      }

      p {
        margin-bottom: 15px;
      }

      .button-wrapper {
        text-align: center;
        margin: 30px 0;
      }

      a.button {
        /* Cor primaria do cliente */
        /* background-color: #224b8d; */
        color: #ffffff;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 999px;
        display: inline-block;
        font-size: 15px;
        font-weight: bold;
      }

      a.button:hover {
        /* Hover da cor primaria do cliente */
        /* background-color: #456aaf; */
      }

      .footer {
        margin-top: 30px;
        gap: 30px;
        font-size: 13px;
        color: #777777;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .footer img {
        width: 140px;
      }
    </style>
  </head>
  <body>
    <div class="container">%content%</div>
    <div class="footer">
      Este &eacute; um e-mail autom&aacute;tico. Por favor, n&atilde;o responda
      diretamente a esta mensagem.
      <!-- URL do Logotipo do cliente -->
      <!-- <img src="{CUSTOMER_LOGO_URL}" /> -->
    </div>
  </body>
</html>
